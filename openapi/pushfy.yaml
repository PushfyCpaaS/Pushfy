openapi: 3.1.0
info:
  title: Pushfy API
  version: 1.0.0
  description: |
    Pushfy API — Messaging (SMS / RCS / Voice), delivery reporting and balance, plus the
    V2 products Push Notifications and Conversational AI (PushAgent).

    Pushfy spans two API generations served from two base URLs:

    - **Messaging & reporting** — classic API at `https://portal.pushfy.com`. Errors are a JSON
      object `{ "error": "..." }` (a few status endpoints answer with plain text).
    - **Push & Conversational AI** — V2 API. Every V2 route is dispatched through the single
      gateway `https://portal.pushfy.com/v2/api.php` using the query parameter `?r=<route>`
      (for example `?r=/v1/conversations`). In this specification the V2 operations are modeled
      under the route path itself (e.g. `/v1/conversations`); the official SDKs build the
      `?r=` gateway call for you. V2 errors are always JSON `{ "ok": false, "error": "..." }`.

    **Authentication by product.** Messaging uses a Bearer token (or `X-API-TOKEN`). The public
    Push device group authenticates with a public `app_id`. The Push server API and PushAgent are
    signed with HMAC-SHA256 (`X-PUSH-*` and `X-PA-*` headers respectively). OpenAPI cannot express
    an HMAC signature scheme, so the required timestamp and signature headers are documented in the
    relevant security scheme descriptions.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Pushfy API Support
    url: https://portal.pushfy.com
    email: fmsolutionbh@gmail.com

servers:
  - url: https://portal.pushfy.com
    description: Messaging & reporting (classic API)
  - url: https://portal.pushfy.com/v2/api.php
    description: Push & Conversational AI (V2 gateway — routes dispatched via ?r=<route>)

tags:
  - name: Messaging
    description: Send SMS, RCS and Voice messages.
  - name: Reporting
    description: Delivery status, day/period reports and blocked numbers.
  - name: Balance
    description: Account SMS balance.
  - name: Push (Public)
    description: Browser/device SDK calls authenticated with the public app_id.
  - name: Push (Server)
    description: Server-to-server Push calls signed with HMAC (X-PUSH-*).
  - name: Conversational AI
    description: PushAgent conversations, events and tasks signed with HMAC (X-PA-*).

security:
  - bearerAuth: []

paths:
  # ------------------------------------------------------------------ MESSAGING
  /webapi:
    post:
      operationId: sendSms
      summary: Send SMS (async / queued, recommended)
      description: |
        Queues one or many text messages and returns immediately. A message that carries an
        `audio` id is dialed as a Voice call instead of an SMS.
      tags: [Messaging]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsSendRequest'
            example:
              messages:
                - ext_id: order-1042
                  destinations:
                    - to: "5511999999999"
                  text: "Your order #1042 has shipped"
      responses:
        '200':
          description: Array with one row per message.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SendResponseItem'
              example:
                - id: order-1042
                  phone: "5511999999999"
                  date: "2026-07-12 14:33:21"
                  ext_id: order-1042
        '400':
          $ref: '#/components/responses/ClassicBadRequest'
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'
        '403':
          $ref: '#/components/responses/ClassicForbidden'
        '429':
          $ref: '#/components/responses/ClassicRateLimited'

  /api:
    post:
      operationId: sendSmsSync
      summary: Send SMS (synchronous)
      description: Same request/response shape as `/webapi`, but writes messages inline and returns real auto-increment ids.
      tags: [Messaging]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsSendRequest'
            example:
              messages:
                - destinations:
                    - to: "5511999999999"
                  text: "Hi Ana"
      responses:
        '200':
          description: Array with one row per message.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SendResponseItem'
        '400':
          $ref: '#/components/responses/ClassicBadRequest'
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'
        '403':
          $ref: '#/components/responses/ClassicForbidden'
        '429':
          $ref: '#/components/responses/ClassicRateLimited'

  /apircsnativo.php:
    post:
      operationId: sendRcs
      summary: Send RCS (recommended)
      description: |
        Queues RCS rich cards against the existing "API RCS" campaign on the account. If no such
        campaign is provisioned the call returns `400 {"error":"rcs_campaign_not_found"}`.
      tags: [Messaging]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RcsSendRequest'
            example:
              messages:
                - ext_id: order-1042
                  destinations:
                    - to: "5511999999999"
                  title: "Your order shipped"
                  image: "https://cdn.example.com/box.png"
                  text: "Order #1042 is on its way"
                  url: "https://shop.example.com/orders/1042"
                  cta: "Track order"
      responses:
        '200':
          description: Array with one row per message.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SendResponseItem'
        '400':
          $ref: '#/components/responses/ClassicBadRequest'
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'
        '403':
          $ref: '#/components/responses/ClassicForbidden'

  /rcs:
    post:
      operationId: sendRcsAutoCampaign
      summary: Send RCS (auto-creates campaign)
      description: |
        Simplest RCS option — creates the campaign automatically. Here `to` is passed directly on
        each message object (not inside `destinations`). No deduplication is applied.
      tags: [Messaging]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  items:
                    $ref: '#/components/schemas/RcsMessageFlat'
            example:
              messages:
                - to: "5511999999999"
                  title: "Your order shipped"
                  text: "Order #1042 is on its way"
                  url: "https://shop.example.com/orders/1042"
                  cta: "Track order"
                  image: "https://cdn.example.com/box.png"
      responses:
        '200':
          description: Campaign creation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RcsAutoCampaignResponse'
              example:
                status: ok
                campaign_id: 12345
                inserted: 8
        '400':
          $ref: '#/components/responses/ClassicBadRequest'
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'
        '403':
          $ref: '#/components/responses/ClassicForbidden'

  /rcscampaign:
    post:
      operationId: sendRcsToCampaign
      summary: Send RCS to a specific campaign
      description: Appends messages to a campaign you already own. `cid` is required and validated against your account.
      tags: [Messaging]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      parameters:
        - name: cid
          in: query
          required: true
          description: Id of a campaign owned by your account.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RcsSendRequest'
            example:
              messages:
                - ext_id: order-1042
                  destinations:
                    - to: "5511999999999"
                  text: "Order #1042 is on its way"
      responses:
        '200':
          description: Rows inserted, including the target campaign id (`cid`).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SendResponseItem'
        '400':
          $ref: '#/components/responses/ClassicBadRequest'
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'
        '403':
          $ref: '#/components/responses/ClassicForbidden'

  /audio:
    post:
      operationId: uploadAudio
      summary: Upload a voice audio (.mp3)
      description: |
        Step 1 of Voice sending. Upload an `.mp3`; the returned audio is referenced by its id in a
        subsequent `/webapi` call (message `audio` field) to place a voice call.
      tags: [Messaging]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [nome, audio]
              properties:
                nome:
                  type: string
                  description: A name for the audio, for your own reference.
                audio:
                  type: string
                  format: binary
                  description: The audio file to upload — .mp3 only.
      responses:
        '200':
          description: Audio saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user_id:
                    type: integer
              example:
                message: Audio saved successfully
                user_id: 123
        '400':
          $ref: '#/components/responses/ClassicBadRequest'
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'

  /getstatus:
    get:
      operationId: getMessageStatus
      summary: Delivery status of one message
      description: |
        Look up one message by the `ext_id` you sent it with, or by the internal `uid`. Returns an
        array. Error bodies from this endpoint are plain text.
      tags: [Reporting]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      parameters:
        - name: ext_id
          in: query
          required: false
          description: Your own reference id, as sent with the message.
          schema:
            type: string
        - name: uid
          in: query
          required: false
          description: Internal message id (alternative to ext_id).
          schema:
            type: string
      responses:
        '200':
          description: Array with one object per matching message.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatusItem'
              example:
                - phone: "5511999999999"
                  status: Delivered
                  date: "2026-07-12 14:33:21"
                  channel: SMS
                  statustvoz: Answered
        '400':
          $ref: '#/components/responses/ClassicTextBadRequest'
        '401':
          $ref: '#/components/responses/ClassicTextUnauthorized'
        '404':
          $ref: '#/components/responses/ClassicTextNotFound'

  /getdate:
    get:
      operationId: getStatusByDate
      summary: Status of all messages on a day
      tags: [Reporting]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      parameters:
        - name: date
          in: query
          required: true
          description: Day to report, YYYY-MM-DD.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Array with one object per message.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatusItem'
              example:
                - phone: "5511999999999"
                  status: Delivered
                  date: "2026-07-12 14:33:21"
                  date_dlr: "2026-07-12 14:33:40"
                  ext_id: order-1042
                  channel: SMS
                  brand: YOUR_BRAND
        '400':
          $ref: '#/components/responses/ClassicTextBadRequest'
        '401':
          $ref: '#/components/responses/ClassicTextUnauthorized'
        '404':
          $ref: '#/components/responses/ClassicTextNotFound'

  /reportbydate:
    get:
      operationId: getReportByDate
      summary: Report by date range
      description: Paginated report over a day or a datetime range, with optional filters. Caps at 5000 rows per page.
      tags: [Reporting]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      parameters:
        - name: date
          in: query
          required: false
          description: A single day, YYYY-MM-DD.
          schema:
            type: string
            format: date
        - name: start
          in: query
          required: false
          description: Range start datetime — takes precedence over `date`.
          schema:
            type: string
        - name: end
          in: query
          required: false
          description: Range end datetime — takes precedence over `date`.
          schema:
            type: string
        - name: event
          in: query
          required: false
          description: Filter by status (English name, see status glossary).
          schema:
            type: string
        - name: date_dlr
          in: query
          required: false
          description: Filter by delivery-receipt date.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max rows, up to 5000 (default 1000).
          schema:
            type: integer
            default: 1000
            maximum: 5000
        - name: offset
          in: query
          required: false
          description: Rows to skip, for pagination.
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Array with one object per message.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportItem'
              example:
                - id: "123456"
                  timestamp: "2026-07-12 14:33:21"
                  date_dlr: "2026-07-12 14:33:40"
                  event: Delivered
                  recipient: "5511999999999"
                  label: order-1042
                  message: "Your order #1042 has shipped"
                  channel: SMS
                  status_code: "0"
                  cost: "0.06"
        '400':
          $ref: '#/components/responses/ClassicTextBadRequest'
        '401':
          $ref: '#/components/responses/ClassicTextUnauthorized'
        '404':
          $ref: '#/components/responses/ClassicTextNotFound'

  /strikeapi:
    get:
      operationId: getBlockedNumbers
      summary: List blocked numbers (strike protection)
      tags: [Reporting]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
        - apiTokenHeader: []
      responses:
        '200':
          description: Array of blocked numbers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlockedNumber'
              example:
                - phone_number: "5511999999999"
                  block_reason: repeated_undelivered
                  undelivered_total: 5
                  blocked_at: "2026-07-01 09:15:00"
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'

  /balance:
    get:
      operationId: getBalance
      summary: Account SMS balance
      description: |
        Returns the SMS balance as a formatted string with a thousands separator. Accepts only the
        main account Bearer token (or Basic); secondary multi-tokens are rejected.
      tags: [Balance]
      servers:
        - url: https://portal.pushfy.com
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current SMS balance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
              example:
                saldo: "1.500"
        '401':
          $ref: '#/components/responses/ClassicUnauthorized'

  # ------------------------------------------------------------- PUSH (PUBLIC)
  /v1/push/config:
    servers:
      - url: https://portal.pushfy.com/v2/api.php
    get:
      operationId: getPushConfig
      summary: Public push config for the SDK
      description: Returns the VAPID public key and opt-in settings for a public `app_id`. Routed via `?r=/v1/push/config`.
      tags: [Push (Public)]
      security: []
      parameters:
        - name: app_id
          in: query
          required: true
          description: Your public application id.
          schema:
            type: string
      responses:
        '200':
          description: SDK configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushConfigResponse'
              example:
                ok: true
                app_id: pushapp_xxxxxxxxxxxx
                vapid_public: BExxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
                optin:
                  prompt: soft
                  delay: 5
        '400':
          $ref: '#/components/responses/V2BadRequest'
        '403':
          $ref: '#/components/responses/V2Forbidden'

  /v1/push/subscribe:
    servers:
      - url: https://portal.pushfy.com/v2/api.php
    post:
      operationId: subscribePushDevice
      summary: Register / update a device (public)
      description: |
        Registers the device's push subscription (web push) or native token. Routed via
        `?r=/v1/push/subscribe`. If the project defines an allowed-origins list, the browser
        `Origin` must match it (an empty list allows any origin).
      tags: [Push (Public)]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushSubscribeRequest'
            example:
              app_id: pushapp_xxxxxxxxxxxx
              provider: webpush
              platform: web
              subscription:
                endpoint: "https://fcm.googleapis.com/fcm/send/xxxxxxxx"
                keys:
                  p256dh: BExxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
                  auth: xxxxxxxxxxxxxxxxxxxxxx
              user_ext_id: user-42
              tags: [vip, pt-br]
              context:
                lang: pt-BR
                tz: America/Sao_Paulo
                pwa: false
      responses:
        '200':
          description: Device registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  device_id:
                    type: integer
              example:
                ok: true
                device_id: 123
        '400':
          $ref: '#/components/responses/V2BadRequest'
        '403':
          $ref: '#/components/responses/V2Forbidden'
        '429':
          $ref: '#/components/responses/V2RateLimited'

  /v1/push/unsubscribe:
    servers:
      - url: https://portal.pushfy.com/v2/api.php
    post:
      operationId: unsubscribePushDevice
      summary: Opt a device out (public)
      description: Identify the device by `token` or by `subscription.endpoint`. Routed via `?r=/v1/push/unsubscribe`.
      tags: [Push (Public)]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_id]
              properties:
                app_id:
                  type: string
                token:
                  type: string
                subscription:
                  type: object
                  properties:
                    endpoint:
                      type: string
            example:
              app_id: pushapp_xxxxxxxxxxxx
              subscription:
                endpoint: "https://fcm.googleapis.com/fcm/send/xxxxxxxx"
      responses:
        '200':
          description: Device opted out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              example:
                ok: true
        '400':
          $ref: '#/components/responses/V2BadRequest'

  /v1/push/track:
    servers:
      - url: https://portal.pushfy.com/v2/api.php
    post:
      operationId: trackPushEvent
      summary: Report a device-side event (public)
      description: Reports a `delivered` / `open` / `click` / `close` / `conversion` event. Routed via `?r=/v1/push/track`.
      tags: [Push (Public)]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushTrackRequest'
            example:
              app_id: pushapp_xxxxxxxxxxxx
              event: click
              campaign_id: 987
              delivery_id: d-xxxxxxxx
      responses:
        '200':
          description: Event recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              example:
                ok: true
        '400':
          $ref: '#/components/responses/V2BadRequest'
        '429':
          $ref: '#/components/responses/V2RateLimited'

  # ------------------------------------------------------------- PUSH (SERVER)
  /v1/push/devices:
    servers:
      - url: https://portal.pushfy.com/v2/api.php
    get:
      operationId: listPushDevices
      summary: List devices (server)
      tags: [Push (Server)]
      security:
        - pushHmac: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: platform
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Max rows (max 500).
          schema:
            type: integer
            maximum: 500
      responses:
        '200':
          description: List of devices.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/PushDevice'
        '401':
          $ref: '#/components/responses/V2Unauthorized'
        '403':
          $ref: '#/components/responses/V2Forbidden'
        '429':
          $ref: '#/components/responses/V2RateLimited'
    post:
      operationId: createPushDevice
      summary: Register a device server-side
      description: Requires `project_id` or `app_id`, and `token`.
      tags: [Push (Server)]
      security:
        - pushHmac: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushDeviceCreate'
            example:
              app_id: pushapp_xxxxxxxxxxxx
              token: fcm-device-token-xxxx
              platform: android
              user_ext_id: user-42
      responses:
        '200':
          description: Device registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  device_id:
                    type: integer
              example:
                ok: true
                device_id: 123
        '400':
          $ref: '#/components/responses/V2BadRequest'
        '401':
          $ref: '#/components/responses/V2Unauthorized'
        '429':
          $ref: '#/components/responses/V2RateLimited'

  /v1/push/devices/{id}:
    servers:
      - url: https://portal.pushfy.com/v2/api.php
    parameters:
      - $ref: '#/components/parameters/PathId'
    delete:
      operationId: deletePushDevice
      summary: Delete / opt out a device (server)
      tags: [Push (Server)]
      security:
        - pushHmac: []
      responses:
        '200':
          description: Device removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
              example:
                ok: true
        '401':
          $ref: '#/components/responses/V2Unauthorized'
        '404':
          $ref: '#/components/responses/V2NotFound'

  /v1/push/campaigns:
    servers:
      - url: https://portal.pushfy.com/v2/api.php
    get:
      operationId: listPushCampaigns
      summary: List campaigns (server)
      tags: [Push (Server)]
      security:
        - pushHmac: []
      responses:
        '200':
          description: List of campaigns.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  campaigns:
                    type: array
                    items:
                      $ref: '#/components/schemas/PushCampaign'
        '401':
          $ref: '#/components/responses/V2Unauthorized'
        '403':
          $ref: '#/components/responses/V2Forbidden'
    post:
      operationId: createPushCampaign
      summary: Create a campaign (server)
      tags: [Push (Server)]
      security:
        - pushHmac: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushCampaign'
            example:
              name: Weekend promo
              title: 50% off today
              body: Tap to claim your bonus
              url: "https://example.com/promo"
              audience:
                tags: [vip]
      responses:
        '200':
          description: Campaign created (draft).
          content:
            application/json:
              schema:
