components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Messaging Bearer token. Send `Authorization: Bearer YOUR_API_TOKEN` on every messaging
        request. HTTP Basic (`login:password`) is also accepted by messaging endpoints.
    apiTokenHeader:
      type: apiKey
      in: header
      name: X-API-TOKEN
      description: Alternative messaging credential — the same API token sent in the `X-API-TOKEN` header instead of `Authorization`.
    paHmac:
      type: apiKey
      in: header
      name: X-PA-Key
      description: |
        PushAgent (Conversational AI) HMAC authentication. Besides the `X-PA-Key` header (the
        `pak_` key id) each request MUST also carry:
          - `X-PA-Timestamp`: current Unix time in seconds (server accepts a +/-300s window).
          - `X-PA-Signature`: HMAC-SHA256 hex of the canonical string, using your `pas_` secret.

        Signing recipe (see Authentication):
          body_hash = sha256_hex(raw_request_body)   # sha256_hex("") for GET/empty body
          base      = timestamp + "\n" + METHOD + "\n" + path + "\n" + body_hash
          signature = hmac_sha256_hex(base, secret)
        `path` is the route only (e.g. /v1/conversations), without the ?r= query string.
        OpenAPI cannot model the timestamp+signature pair, so they are documented here.
    pushHmac:
      type: apiKey
      in: header
      name: X-PUSH-Key
      description: |
        Push server API HMAC authentication. Besides the `X-PUSH-Key` header (the `pushk_` key id)
        each request MUST also carry:
          - `X-PUSH-Timestamp`: current Unix time in seconds (+/-300s window).
          - `X-PUSH-Signature`: HMAC-SHA256 hex of the canonical string, using your `pss_` secret.

        Same signing recipe as PushAgent (see Authentication): the base string is
        timestamp + "\n" + METHOD + "\n" + path + "\n" + sha256_hex(body). Write calls also accept
        an optional `Idempotency-Key` header (<=120 chars). OpenAPI cannot model the
        timestamp+signature pair, so they are documented here.

  parameters:
    PathId:
      name: id
      in: path
      required: true
      description: Resource id.
      schema:
        type: integer
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional idempotency key (<=120 chars) — repeating the same key returns the original response instead of acting twice.
      schema:
        type: string
        maxLength: 120

  responses:
    ClassicBadRequest:
      description: Invalid request (e.g. invalid_json, invalid_payload, max_100000, rcs_campaign_not_found, cid_required).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorClassic'
          example:
            error: invalid_payload
    ClassicUnauthorized:
      description: Missing or invalid token (`unauthorized`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorClassic'
          example:
            error: unauthorized
    ClassicForbidden:
      description: Forbidden (`ip_not_allowed` / `invalid_campaign`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorClassic'
          example:
            error: ip_not_allowed
    ClassicRateLimited:
      description: Too many requests.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorClassic'
          example:
            error: rate_limited
    ClassicTextBadRequest:
      description: Invalid request — plain text body (e.g. `id parameter is missing`, `date parameter is missing`).
      content:
        text/plain:
          schema:
            type: string
          example: id parameter is missing
    ClassicTextUnauthorized:
      description: Missing or invalid credentials — plain text body.
      content:
        text/plain:
          schema:
            type: string
          example: Unauthorized
    ClassicTextNotFound:
      description: No message matches the query — plain text body.
      content:
        text/plain:
          schema:
            type: string
          example: Messages not found
    V2BadRequest:
      description: Invalid request — V2 returns the offending field name as the error string (e.g. app_id, token, name, type, user_ext_id, content, run_at).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorV2'
          example:
            ok: false
            error: app_id
    V2Unauthorized:
      description: Missing header, bad HMAC signature, or timestamp outside the +/-300s window.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorV2'
          example:
            ok: false
            error: unauthorized
    V2Forbidden:
      description: Product not enabled (`produto_inativo`) or origin not authorized (`origem_nao_autorizada`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorV2'
          example:
            ok: false
            error: produto_inativo
    V2NotFound:
      description: Unknown route or resource (e.g. `rota`, `conversa`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorV2'
          example:
            ok: false
            error: conversa
    V2RateLimited:
      description: Rate limit exceeded — back off and retry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorV2'
          example:
            ok: false
            error: rate_limited

  schemas:
    # ---- Messaging
    SmsMessage:
      type: object
      required: [destinations, text]
      properties:
        destinations:
          type: array
          description: Recipient list — only the first entry is used.
          items:
            type: object
            required: [to]
            properties:
              to:
                type: string
                description: Phone number, digits only, country code first. Min 8 digits.
                example: "5511999999999"
        text:
          type: string
          description: Message body (up to 10,000 chars; longer is truncated).
        ext_id:
          type: string
          description: Your own reference id, echoed back and used for status lookups. Auto-generated if omitted.
        audio:
          type: string
          description: Audio id — turns this message into a voice call.
    SmsSendRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          description: One or more messages (up to 100,000 per request).
          items:
            $ref: '#/components/schemas/SmsMessage'
    SendResponseItem:
      type: object
      description: One row returned per sent message.
      properties:
        id:
          type: string
          description: The message id (echoes ext_id, or the auto-increment id on the sync endpoint).
        phone:
          type: string
        date:
          type: string
          example: "2026-07-12 14:33:21"
        ext_id:
          type: string
    RcsMessage:
      type: object
      required: [destinations, text]
      properties:
        destinations:
          type: array
          description: Recipient list — only the first entry is used.
          items:
            type: object
            required: [to]
            properties:
              to:
                type: string
                example: "5511999999999"
        text:
          type: string
          description: Card body text.
        title:
          type: string
          description: Card title (header).
        image:
          type: string
          description: Image URL shown at the top of the card.
        url:
          type: string
          description: Destination link opened by the button.
        cta:
          type: string
          description: Button label (call to action).
        ext_id:
          type: string
          description: Your own reference id, echoed back and used for status lookups.
    RcsMessageFlat:
      type: object
      description: RCS card for the /rcs auto-campaign endpoint — `to` is on the message itself.
      required: [to, text]
      properties:
        to:
          type: string
          example: "5511999999999"
        text:
          type: string
        title:
          type: string
        image:
          type: string
        url:
          type: string
        cta:
          type: string
        ext_id:
          type: string
    RcsSendRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/RcsMessage'
    RcsAutoCampaignResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        campaign_id:
          type: integer
        inserted:
          type: integer
    StatusItem:
      type: object
      description: Delivery status row (fields vary by lookup endpoint).
      properties:
        phone:
          type: string
        status:
          type: string
          description: See the status glossary (Waiting, Sent, Delivered, Undelivered, ...).
        date:
          type: string
        date_dlr:
          type: string
          description: When the carrier delivery receipt arrived.
        ext_id:
          type: string
        channel:
          type: string
          description: SMS, RCS or TVOZ (voice).
        brand:
          type: string
        statustvoz:
          type: string
          description: Voice call result; only meaningful when channel is TVOZ.
    ReportItem:
      type: object
      description: One row of a /reportbydate report.
      properties:
        id:
          type: string
        timestamp:
          type: string
        date_dlr:
          type: string
        event:
          type: string
        recipient:
          type: string
        label:
          type: string
        message:
          type: string
        channel:
          type: string
          description: SMS, VOICE, RCS or WHATSAPP.
        status_code:
          type: string
        cost:
          type: string
    BlockedNumber:
      type: object
      properties:
        phone_number:
          type: string
        block_reason:
          type: string
        undelivered_total:
          type: integer
        blocked_at:
          type: string
    BalanceResponse:
      type: object
      properties:
        saldo:
          type: string
          description: SMS balance as a formatted string with a thousands separator ("1.500" = one thousand five hundred).
          example: "1.500"
    # ---- Push (Public)
    PushConfigResponse:
      type: object
      properties:
        ok:
          type: boolean
        app_id:
          type: string
        vapid_public:
          type: string
        optin:
          type: object
          properties:
            prompt:
              type: string
            delay:
              type: integer
    PushSubscribeRequest:
      type: object
      required: [app_id]
      properties:
        app_id:
          type: string
          description: Your public application id.
        provider:
          type: string
          description: webpush (default), fcm or apns.
          enum: [webpush, fcm, apns]
          default: webpush
        platform:
          type: string
          description: web (default), android, ios or safari.
          enum: [web, android, ios, safari]
          default: web
        subscription:
          type: object
          description: Web push subscription (required when provider is webpush).
          properties:
            endpoint:
              type: string
            keys:
              type: object
              properties:
                p256dh:
                  type: string
                auth:
                  type: string
        token:
          type: string
          description: Native push token (required when provider is fcm/apns).
        user_ext_id:
          type: string
        tags:
          type: array
          items:
            type: string
        attrs:
          type: object
          additionalProperties: true
        context:
          type: object
          properties:
            ua:
              type: string
            lang:
              type: string
            tz:
              type: string
            country:
              type: string
            pwa:
              type: boolean
    PushTrackRequest:
      type: object
      required: [app_id, event]
      properties:
        app_id:
          type: string
        event:
          type: string
          enum: [delivered, open, click, close, conversion]
        campaign_id:
          type: integer
        delivery_id:
          type: string
        value:
          type: number
        token:
          type: string
        meta:
          type: object
          additionalProperties: true
    # ---- Push (Server)
    PushDevice:
      type: object
      properties:
        id:
          type: integer
        platform:
          type: string
        status:
          type: string
        user_ext_id:
          type: string
        token:
          type: string
    PushDeviceCreate:
      type: object
      description: Requires project_id or app_id, and token.
      required: [token]
      properties:
        project_id:
          type: integer
        app_id:
          type: string
        token:
          type: string
        platform:
          type: string
        user_ext_id:
          type: string
        tags:
          type: array
          items:
            type: string
    PushCampaign:
      type: object
      required: [name]
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Internal campaign name.
        title:
          type: string
          description: Notification title.
        body:
          type: string
          description: Notification body.
        url:
          type: string
          description: Click-through URL.
        icon:
          type: string
        image:
          type: string
        ttl:
          type: integer
          description: Time-to-live in seconds.
        priority:
          type: string
        status:
          type: string
          readOnly: true
        audience:
          type: object
          description: Targeting (segment id, tags, filter).
          additionalProperties: true
        schedule_at:
          type: string
          description: ISO time to send; omit to send on demand.
    PushCampaignMetrics:
      type: object
      properties:
        ok:
          type: boolean
        campaign_id:
          type: integer
        metrics:
          type: object
          properties:
            sent:
              type: integer
            delivered:
              type: integer
            opens:
              type: integer
            clicks:
              type: integer
            conversions:
              type: integer
    PushSegment:
      type: object
      required: [name]
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        filter:
          type: object
          additionalProperties: true
    PushServerEvent:
      type: object
      required: [event]
      properties:
        event:
          type: string
        user_ext_id:
          type: string
        value:
          type: number
        meta:
          type: object
          additionalProperties: true
    # ---- Conversational AI
    ConversationOpenRequest:
      type: object
      required: [user_ext_id]
      properties:
        user_ext_id:
          type: string
          description: Your own id for the end user.
        name:
          type: string
          description: Display name for the user.
        channel:
          type: string
          enum: [webchat, sms, rcs, api]
          default: api
    ConversationMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        created_at:
          type: string
    Conversation:
      type: object
      properties:
        ok:
          type: boolean
        conversation_id:
          type: integer
        status:
          type: string
          description: bot, humano or fechada.
          enum: [bot, humano, fechada]
        canal:
          type: string
        intent:
          type: string
        sentiment:
          type: string
        messages:
          type: array
          description: Up to the 200 most recent messages.
          items:
            $ref: '#/components/schemas/ConversationMessage'
    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: The user's message text (`text` is accepted as an alias).
    BusinessEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: Event type, up to 48 characters (e.g. deposit_completed).
          maxLength: 48
        user_ext_id:
          type: string
        data:
          type: object
          additionalProperties: true
    TaskInput:
      type: object
      required: [conversation_id, run_at]
      properties:
        conversation_id:
          type: integer
        run_at:
          type: string
          description: When to run — a future date/time.
        text:
          type: string
    # ---- Shared
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
    ErrorClassic:
      type: object
      description: Classic messaging error object.
      properties:
        error:
          type: string
      required: [error]
    ErrorV2:
      type: object
      description: V2 (Push / PushAgent) error object.
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
      required: [ok, error]
